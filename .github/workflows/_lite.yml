# Bisect probe v2: replicate python-ci.yml shape minimally.
name: _lite
on:
  workflow_call:
    inputs:
      package-name: { type: string, required: true }
      package-path: { type: string, required: true }
      python-versions:
        type: string
        default: '["3.10","3.11","3.12","3.13","3.14"]'
      cov-fail-under:
        type: number
        default: 80
      windows-allow-fail:
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "lint stub package=${{ inputs.package-name }} path=${{ inputs.package-path }} cov=${{ inputs.cov-fail-under }}"

  test-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        py: ${{ fromJSON(inputs.python-versions) }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' && inputs.windows-allow-fail }}
    steps:
      - run: echo "${{ matrix.os }} ${{ matrix.py }}"

  call-version-check:
    uses: hrliaghati/ci-workflows/.github/workflows/version-check.yml@main
    with:
      version-files: '["pyproject.toml"]'
