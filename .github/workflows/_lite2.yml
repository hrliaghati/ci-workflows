# Bisect _lite + uv-setup + sticky-comment + artifact upload
name: _lite2
on:
  workflow_call:
    inputs:
      package-name: { type: string, required: true }
      package-path: { type: string, required: true }
      python-versions:
        type: string
        default: '["3.10","3.11","3.12","3.13","3.14"]'
      cov-fail-under:
        type: number
        default: 80

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.12

  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.12
      - id: version
        run: |
          v=$(uv run --with tomli python -c "import tomli; print(tomli.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - run: uv build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ inputs.package-name }}-${{ steps.version.outputs.version }}
          path: dist/*.whl
          if-no-files-found: error

  wheel-comment:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: wheel-artifact
          message: |
            Wheel built: `${{ inputs.package-name }} ${{ needs.build.outputs.version }}`
