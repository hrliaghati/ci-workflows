# Bisect: just setup-uv + uv build, no sticky comment job.
name: _lite3
on:
  workflow_call:
    inputs:
      package-name: { type: string, required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ inputs.package-name }}
          path: dist/*.whl
          if-no-files-found: error
