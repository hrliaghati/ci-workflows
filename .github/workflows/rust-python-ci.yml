# Reusable: Rust + Python (PyO3 + maturin) CI.
#
# Architecture (post-self-hosted migration):
#   - All Rust + Python lint + wheel building runs on the mac-mini-m4-pro
#     self-hosted runner ([self-hosted, macOS, ARM64]).
#   - Cross-platform wheels (Linux x86_64/aarch64, Windows x86_64/aarch64,
#     macOS universal2) are produced in a single job via the
#     wheel-builder:latest Docker image that lives on the Mac runner.
#   - Native wheel testing happens on three runners:
#       macOS arm64    : [self-hosted, macOS, ARM64]
#       Linux x86_64   : [self-hosted, Linux, X64, docker]
#       Windows x86_64 : [self-hosted, Windows, X64]
#     Linux aarch64 and Windows aarch64 wheels are built and uploaded
#     as artifacts but not tested (no aarch64 runner for those OSes).
#
# Two build modes:
#   abi3=true  → one wheel per OS (5 total) that works on all Python
#                versions listed in `python-versions` (must all be >=
#                the consumer's abi3 floor in Cargo.toml).
#   abi3=false → per-CPython wheels: one wheel per (OS, Python). Use
#                this when the Rust crate uses APIs that don't fit abi3
#                (e.g. numpy C API).
#
# Cross-repo private fetching uses the `equiped-release-bot` GitHub App
# (app id 3680486, installed org-wide with contents:read). The app's
# private key must be set as `RELEASE_BOT_PRIVATE_KEY` on each consumer.

name: rust-python-ci

on:
  workflow_call:
    inputs:
      package-name:
        description: 'Distribution name (matches [project].name in pyproject.toml).'
        type: string
        required: true
      package-path:
        description: 'Python import path / coverage target (passed to pytest --cov=).'
        type: string
        required: true
      manifest-dir:
        description: 'Directory containing the maturin pyproject.toml. Use "." for repo root.'
        type: string
        default: '.'
      abi3:
        description: 'true → one wheel per OS (abi3); false → one wheel per (OS, Python).'
        type: boolean
        default: true
      python-versions:
        description: 'JSON array of Python versions for the test matrix (and per-CPython build matrix when abi3=false).'
        type: string
        default: '["3.10","3.13"]'
      rust-toolchains:
        description: 'JSON array of Rust toolchains for the Rust matrix (e.g. ["stable","1.83"] to also check MSRV).'
        type: string
        default: '["stable"]'
      cargo-test-args:
        description: 'Extra arguments to cargo test.'
        type: string
        default: '--workspace'
      pytest-args:
        description: 'Argument(s) to pytest (test paths).'
        type: string
        default: 'tests/python/'
      pytest-markers:
        description: 'Marker expression for pytest -m.'
        type: string
        default: 'not slow'
      cov-fail-under:
        description: 'pytest --cov-fail-under threshold (whole percent). 0 disables coverage gating.'
        type: number
        default: 0
      cargo-fail-under-lines:
        description: 'cargo-llvm-cov --fail-under-lines threshold. 0 disables Rust coverage gating.'
        type: number
        default: 0
      clippy-deny-warnings:
        description: 'If true, run clippy with -D warnings.'
        type: boolean
        default: false
      mypy-path:
        description: 'Path passed to mypy. Empty disables.'
        type: string
        default: ''
      version-files:
        description: 'JSON array of version-bearing files for the version-bump gate.'
        type: string
        default: '["pyproject.toml","Cargo.toml"]'
      version-skip-paths-regex:
        type: string
        default: '^(\.github/|docs/|.*\.md$|\.gitignore$|LICENSE$|\.pre-commit-config\.yaml$)'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # The equiped-release-bot GitHub App id is not a secret — anyone with
  # access to a workflow file can see it. Only the private key is.
  EQUIPED_BOT_APP_ID: '3680486'

jobs:
  # -------- Rust: fmt / clippy / test / coverage ----------------------
  rust:
    name: rust (${{ matrix.toolchain }})
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      matrix:
        toolchain: ${{ fromJSON(inputs.rust-toolchains) }}
    env:
      CARGO_TERM_COLOR: always
      # pyo3 with the abi3-pyXXX feature requires Python >= the floor.
      # The self-hosted Mac runner's plain `python3` is Apple's
      # /usr/bin/python3 (3.9.6); pyo3 finds it first and aborts. Pin to
      # a runner-resident interpreter (uv-managed Python 3.11 at
      # ~/.local/bin/python3.11).
      PYO3_PYTHON: python3.11
      # Cargo's bundled libgit2 doesn't always honor the
      # `url.<x>.insteadOf` rewrites that private-fetch installs in
      # gitconfig. Force cargo to shell out to the system `git`, which
      # respects the rewrites — needed for cross-repo cargo deps
      # (e.g. stateprop-core → refframe-core) to fetch via the bot token.
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          # See ci-workflows note: keep checkout from persisting a
          # GITHUB_TOKEN extraheader that would override private-fetch
          # URL rewrites for cross-repo cargo/pip fetches.
          persist-credentials: false
      - uses: equiped-code/ci-workflows/actions/private-fetch@main
        with:
          app-id: ${{ env.EQUIPED_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.manifest-dir }}
      # Drop `cargo build --workspace --all-targets` — `cargo test`
      # below builds the test targets and `cargo clippy --all-targets`
      # below builds the rest, so the explicit build is redundant. It
      # also fails on non-abi3 -py crates whose cdylib expects to be
      # linked into a Python host (unresolved CPython symbols at link
      # time).
      - name: cargo test
        run: cargo test ${{ inputs.cargo-test-args }}
      - name: cargo fmt --check
        if: matrix.toolchain == 'stable'
        run: cargo fmt --all --check
      - name: cargo clippy (deny warnings)
        if: matrix.toolchain == 'stable' && inputs.clippy-deny-warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy (informational)
        if: matrix.toolchain == 'stable' && (! inputs.clippy-deny-warnings)
        run: cargo clippy --workspace --all-targets
      - name: Install cargo-llvm-cov
        if: matrix.toolchain == 'stable' && inputs.cargo-fail-under-lines > 0
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: cargo llvm-cov
        if: matrix.toolchain == 'stable' && inputs.cargo-fail-under-lines > 0
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --fail-under-lines ${{ inputs.cargo-fail-under-lines }}
      - name: Upload Rust coverage
        if: matrix.toolchain == 'stable' && inputs.cargo-fail-under-lines > 0
        uses: actions/upload-artifact@v4
        with:
          name: rust-lcov
          path: lcov.info
          retention-days: 14

  # -------- Python lint -----------------------------------------------
  lint-py:
    name: lint-py
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6
        with:
          # See ci-workflows note: keep checkout from persisting a
          # GITHUB_TOKEN extraheader that would override private-fetch
          # URL rewrites for cross-repo cargo/pip fetches.
          persist-credentials: false
      - uses: equiped-code/ci-workflows/actions/private-fetch@main
        with:
          app-id: ${{ env.EQUIPED_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml\n**/uv.lock"
      - name: Install ruff (and mypy if requested)
        run: |
          uv tool install ruff
          if [ -n "${{ inputs.mypy-path }}" ]; then uv tool install mypy; fi
      - run: ruff check ${{ inputs.manifest-dir }}
      - run: ruff format --check ${{ inputs.manifest-dir }}
      - name: mypy
        if: inputs.mypy-path != ''
        run: mypy ${{ inputs.mypy-path }}

  # -------- Version-bump gate -----------------------------------------
  version-check:
    uses: equiped-code/ci-workflows/.github/workflows/version-check.yml@main
    with:
      version-files: ${{ inputs.version-files }}
      skip-paths-regex: ${{ inputs.version-skip-paths-regex }}

  # -------- Build wheels (single job on the Mac) ----------------------
  build-wheels:
    name: build-wheels
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6
        with:
          # See ci-workflows note: keep checkout from persisting a
          # GITHUB_TOKEN extraheader that would override private-fetch
          # URL rewrites for cross-repo cargo/pip fetches.
          persist-credentials: false
      - uses: equiped-code/ci-workflows/actions/private-fetch@main
        with:
          app-id: ${{ env.EQUIPED_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - uses: equiped-code/ci-workflows/actions/build-wheels@main
        with:
          abi3: ${{ inputs.abi3 }}
          python-versions: ${{ inputs.python-versions }}
          manifest-dir: ${{ inputs.manifest-dir }}
      - name: List built wheels
        run: ls -la dist/
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ inputs.package-name }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 14

  # -------- Test wheel on macOS arm64 ---------------------------------
  test-wheel-macos:
    name: test-wheel-macos (${{ matrix.python-version }})
    needs: build-wheels
    runs-on: [self-hosted, macOS, ARM64]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # See ci-workflows note: keep checkout from persisting a
          # GITHUB_TOKEN extraheader that would override private-fetch
          # URL rewrites for cross-repo cargo/pip fetches.
          persist-credentials: false
      - uses: equiped-code/ci-workflows/actions/private-fetch@main
        with:
          app-id: ${{ env.EQUIPED_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - uses: actions/download-artifact@v4
        with:
          name: wheels-${{ inputs.package-name }}
          path: dist/
      - name: Run pytest against the macOS wheel
        shell: bash
        env:
          ABI3: ${{ inputs.abi3 }}
          PYV: ${{ matrix.python-version }}
          COV_FAIL_UNDER: ${{ inputs.cov-fail-under }}
        run: |
          set -euo pipefail
          "python${PYV}" -m venv .venv
          PY=.venv/bin/python

          if [ "$ABI3" = "true" ]; then
            wheel=$(ls dist/*macosx*universal2*.whl 2>/dev/null | head -n1)
            [ -z "$wheel" ] && wheel=$(ls dist/*macosx*.whl | head -n1)
          else
            pytag="cp$(echo "$PYV" | tr -d .)"
            wheel=$(ls dist/*${pytag}*macosx*.whl | head -n1)
          fi
          echo "Installing $wheel"
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install "$wheel" pytest pytest-cov

          cd "${{ inputs.manifest-dir }}"
          if [ "$COV_FAIL_UNDER" -gt 0 ]; then
            "$PY" -m pytest ${{ inputs.pytest-args }} \
              -m "${{ inputs.pytest-markers }}" \
              --cov=${{ inputs.package-path }} \
              --cov-fail-under=$COV_FAIL_UNDER
          else
            "$PY" -m pytest ${{ inputs.pytest-args }} \
              -m "${{ inputs.pytest-markers }}"
          fi

  # -------- Test wheel on Linux x86_64 --------------------------------
  test-wheel-linux:
    name: test-wheel-linux (${{ matrix.python-version }})
    needs: build-wheels
    runs-on: [self-hosted, Linux, X64, docker]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # See ci-workflows note: keep checkout from persisting a
          # GITHUB_TOKEN extraheader that would override private-fetch
          # URL rewrites for cross-repo cargo/pip fetches.
          persist-credentials: false
      - uses: equiped-code/ci-workflows/actions/private-fetch@main
        with:
          app-id: ${{ env.EQUIPED_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - uses: actions/download-artifact@v4
        with:
          name: wheels-${{ inputs.package-name }}
          path: dist/
      - name: Run pytest against the Linux x86_64 wheel
        shell: bash
        env:
          ABI3: ${{ inputs.abi3 }}
          PYV: ${{ matrix.python-version }}
        run: |
          set -euo pipefail
          uv venv .venv --python "python${PYV}"
          PY=.venv/bin/python

          if [ "$ABI3" = "true" ]; then
            wheel=$(ls dist/*manylinux*x86_64*.whl | head -n1)
          else
            pytag="cp$(echo "$PYV" | tr -d .)"
            wheel=$(ls dist/*${pytag}*manylinux*x86_64*.whl | head -n1)
          fi
          echo "Installing $wheel"
          uv pip install --python "$PY" "$wheel" pytest pytest-cov

          cd "${{ inputs.manifest-dir }}"
          "$PY" -m pytest ${{ inputs.pytest-args }} \
            -m "${{ inputs.pytest-markers }}"

  # -------- Test wheel on Windows AMD64 -------------------------------
  test-wheel-windows:
    name: test-wheel-windows (${{ matrix.python-version }})
    needs: build-wheels
    runs-on: [self-hosted, Windows, X64]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # See ci-workflows note: keep checkout from persisting a
          # GITHUB_TOKEN extraheader that would override private-fetch
          # URL rewrites for cross-repo cargo/pip fetches.
          persist-credentials: false
      - uses: equiped-code/ci-workflows/actions/private-fetch@main
        with:
          app-id: ${{ env.EQUIPED_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
      - uses: actions/download-artifact@v4
        with:
          name: wheels-${{ inputs.package-name }}
          path: dist/
      - name: Run pytest against the Windows AMD64 wheel
        shell: sh
        env:
          ABI3: ${{ inputs.abi3 }}
          PYV: ${{ matrix.python-version }}
        run: |
          set -euo pipefail
          uv python install "$PYV"
          uv venv .venv --python "$PYV"
          PY=.venv/Scripts/python.exe

          if [ "$ABI3" = "true" ]; then
            wheel=$(ls dist/*win_amd64*.whl | head -n1)
          else
            pytag="cp$(echo "$PYV" | tr -d .)"
            wheel=$(ls dist/*${pytag}*win_amd64*.whl | head -n1)
          fi
          echo "Installing $wheel"
          uv pip install --python "$PY" "$wheel" pytest pytest-cov

          cd "${{ inputs.manifest-dir }}"
          "$PY" -m pytest ${{ inputs.pytest-args }} \
            -m "${{ inputs.pytest-markers }}"
