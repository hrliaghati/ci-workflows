# Reusable: Rust + Python (PyO3 + maturin) CI.
#
# Two build modes:
#   abi3=true  → one wheel per OS that works on all Python versions
#                listed in `python-versions` (must all be >= the abi3
#                floor encoded in the consumer's Cargo.toml).
#   abi3=false → per-CPython wheels: one wheel per (OS × Python). Use
#                this when the Rust crate uses APIs that don't fit abi3
#                (e.g. numpy C API, like orbprop).
#
# Build matrix:
#   PR  : ubuntu + windows
#   main: ubuntu + windows + macOS (so the macOS wheel exists by tag time)
#
# macOS short-test job builds its own wheel inline on PRs (since the
# build matrix excludes macOS on PRs). On main pushes it downloads the
# macOS wheel from the build-macos job.

name: rust-python-ci

on:
  workflow_call:
    inputs:
      package-name:
        description: 'Distribution name (matches [project].name in the maturin pyproject.toml).'
        type: string
        required: true
      package-path:
        description: 'Coverage target. Pass to --cov= as-is (e.g. routelib).'
        type: string
        required: true
      manifest-dir:
        description: 'Directory containing the maturin pyproject.toml. Use "." when it lives at the repo root.'
        type: string
        default: '.'
      abi3:
        description: 'true → one wheel per OS (abi3); false → one wheel per (OS, Python) combination.'
        type: boolean
        default: true
      python-versions:
        description: 'JSON array of Python versions for short tests (and per-CPython build matrix when abi3=false).'
        type: string
        default: '["3.10","3.11","3.12","3.13","3.14"]'
      slow-test-versions:
        description: 'JSON array of Python versions for slow tests (Linux + Windows only).'
        type: string
        default: '["3.10","3.14"]'
      macos-short-test-version:
        description: 'Single Python version for macOS short-test job. macOS is excluded from slow tests.'
        type: string
        default: '3.12'
      cov-fail-under:
        description: 'pytest --cov-fail-under threshold (whole percent).'
        type: number
        default: 80
      cargo-fail-under-lines:
        description: 'cargo-llvm-cov --fail-under-lines threshold.'
        type: number
        default: 80
      mypy-path:
        description: 'Path passed to mypy. Empty string disables mypy.'
        type: string
        default: ''
      windows-allow-fail:
        description: 'If true, Windows test jobs use continue-on-error: true.'
        type: boolean
        default: false
      version-files:
        description: 'JSON array of version-bearing files for the version-bump gate.'
        type: string
        default: '["pyproject.toml","Cargo.toml"]'
      version-skip-paths-regex:
        type: string
        default: '^(\.github/|docs/|.*\.md$|\.gitignore$|LICENSE$|\.pre-commit-config\.yaml$)'
      uv-version:
        type: string
        default: 'latest'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------- Lint (Python) ---------------------------------------------
  lint-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          version: ${{ inputs.uv-version }}
          cache-dependency-glob: "**/pyproject.toml\n**/uv.lock"
      - run: uv python install 3.12
      - name: Install ruff (and mypy if requested) via uv tool
        # uv pip install --system fails on PEP 668 systems (Debian).
        # uv tool install creates an isolated managed venv and PATH entry.
        run: |
          uv tool install ruff
          if [ -n "${{ inputs.mypy-path }}" ]; then uv tool install mypy; fi
      - run: ruff check ${{ inputs.manifest-dir }}
      - run: ruff format --check ${{ inputs.manifest-dir }}
      - name: mypy
        if: inputs.mypy-path != ''
        run: mypy ${{ inputs.mypy-path }}

  # -------- Rust: fmt / clippy / test / coverage ----------------------
  # PyO3 extension crates need Python dev headers for linking, so we
  # set up Python here too. The Python version is fixed (3.12) since
  # this job tests Rust logic, not Python compatibility.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # Clippy is informational for now — Rust toolchain releases add new
      # lints regularly and pre-existing cohort code triggers many. Once
      # the cohort is clean, ratchet to `-- -D warnings` (per-repo or via
      # workspace [lints] in Cargo.toml).
      - run: cargo clippy --all-targets --workspace
      - run: cargo test --workspace
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: cargo llvm-cov (Rust coverage with floor)
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --fail-under-lines ${{ inputs.cargo-fail-under-lines }}
      - uses: actions/upload-artifact@v7
        with:
          name: rust-lcov
          path: lcov.info
          retention-days: 14

  # -------- Version-bump gate -----------------------------------------
  version-check:
    uses: hrliaghati/ci-workflows/.github/workflows/version-check.yml@main
    with:
      version-files: ${{ inputs.version-files }}
      skip-paths-regex: ${{ inputs.version-skip-paths-regex }}

  # -------- Build wheels: Linux + Windows (always) --------------------
  # When abi3=true, matrix.py is just '3.12' (one wheel per OS that
  # works for all Python). When abi3=false, full per-CPython matrix.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        py: ${{ fromJSON(inputs.abi3 && '["3.12"]' || inputs.python-versions) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.manifest-dir }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ inputs.manifest-dir }}
          command: build
          # --out is relative to working-directory; in Cargo workspaces the
          # default 'target/wheels' lives at workspace root, not the crate.
          # Pin it next to the maturin pyproject so the upload path is stable.
          args: --release --interpreter ${{ matrix.py }} --out dist
      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ inputs.package-name }}-${{ matrix.os }}-${{ matrix.py }}
          path: ${{ inputs.manifest-dir }}/dist/*.whl
          if-no-files-found: error
          retention-days: 14

  # -------- Build wheels: macOS (only on main pushes) -----------------
  build-macos:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        py: ${{ fromJSON(inputs.abi3 && '["3.12"]' || inputs.python-versions) }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.manifest-dir }}
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ inputs.manifest-dir }}
          command: build
          args: --release --interpreter ${{ matrix.py }} --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ inputs.package-name }}-macos-latest-${{ matrix.py }}
          path: ${{ inputs.manifest-dir }}/dist/*.whl
          if-no-files-found: error
          retention-days: 14

  # -------- Wheel sticky comment (PR only) ----------------------------
  wheel-comment:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: wheel-artifact
          message: |
            ### Wheels (`${{ inputs.package-name }}`)

            Mode: ${{ inputs.abi3 && 'abi3 (one wheel per OS, works on all listed Python versions)' || 'per-CPython (one wheel per OS × Python)' }}

            Download from this run's
            [Artifacts panel](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts).

            PRs build Linux + Windows wheels. macOS wheels are built only on `main` pushes.

            Updated automatically on each push to this PR.

  # -------- Short tests -----------------------------------------------
  # Three sub-jobs, joined by the same `test-short` name in branch
  # protection: linux/windows/macos. Splitting them avoids the
  # download-vs-inline branching when matrixing all three OSes together.
  test-short-linux-windows:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        py: ${{ fromJSON(inputs.python-versions) }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' && inputs.windows-allow-fail }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          version: ${{ inputs.uv-version }}
          cache-dependency-glob: "**/pyproject.toml\n**/uv.lock"
      - run: uv python install ${{ matrix.py }}
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ inputs.package-name }}-${{ matrix.os }}-${{ inputs.abi3 && '3.12' || matrix.py }}
          path: dist
      - name: Install wheel + test deps into a fresh venv
        shell: bash
        # Build a venv pinned to the matrix Python and install the wheel
        # directly. We invoke pytest via the venv's python binary because
        # `uv run` can pick the wrong interpreter when there's no
        # pyproject.toml at the repo root (workspace projects).
        run: |
          uv venv .venv --python ${{ matrix.py }}
          if [ -f .venv/bin/python ]; then PY=.venv/bin/python; else PY=.venv/Scripts/python.exe; fi
          echo "PY=$PY" >> "$GITHUB_ENV"
          uv pip install --python "$PY" "$(ls dist/*.whl | head -n1)"
          uv pip install --python "$PY" pytest pytest-cov
      - name: Run short tests
        shell: bash
        # cd into the maturin-pyproject directory so pytest's rootdir is
        # the python project, not the cargo workspace root. Avoids any
        # accidental discovery of the source dir as an importable package.
        # Use absolute PY because cwd changed.
        run: |
          ABS_PY="$(realpath "$PY")"
          cd "${{ inputs.manifest-dir }}"
          "$ABS_PY" -m pytest -m "not slow" \
            --cov=${{ inputs.package-path }} \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=${{ inputs.cov-fail-under }} \
            | tee pytest-coverage.txt
          # Move outputs back to repo root for upload-artifact compatibility.
          mv pytest-coverage.txt "$GITHUB_WORKSPACE/" 2>/dev/null || true
          mv coverage.xml "$GITHUB_WORKSPACE/" 2>/dev/null || true
          mv htmlcov "$GITHUB_WORKSPACE/" 2>/dev/null || true
      - name: Upload htmlcov (Linux 3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.py == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-short
          path: htmlcov
          retention-days: 14
      - name: Upload coverage artifact for sticky comment
        if: matrix.os == 'ubuntu-latest' && matrix.py == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-short
          path: |
            coverage.xml
            pytest-coverage.txt
          retention-days: 1

  test-short-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.manifest-dir }}
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          version: ${{ inputs.uv-version }}
          cache-dependency-glob: "**/pyproject.toml\n**/uv.lock"
      - run: uv python install ${{ inputs.macos-short-test-version }}

      - uses: actions/setup-python@v5
        if: github.event_name == 'pull_request'
        with:
          python-version: ${{ inputs.macos-short-test-version }}

      # On PRs we build inline (PR build matrix excludes macOS).
      - name: Build wheel inline (PR only)
        if: github.event_name == 'pull_request'
        uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ inputs.manifest-dir }}
          command: build
          args: --release --interpreter ${{ inputs.macos-short-test-version }} --out dist

      # On main pushes we download from build-macos.
      - name: Download macOS wheel (main push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ inputs.package-name }}-macos-latest-${{ inputs.abi3 && '3.12' || inputs.macos-short-test-version }}
          path: dist

      - name: Install wheel + test deps
        shell: bash
        run: |
          uv venv .venv --python ${{ inputs.macos-short-test-version }}
          PY=.venv/bin/python
          echo "PY=$PY" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            wheel=$(ls "${{ inputs.manifest-dir }}/dist/"*.whl | head -n1)
          else
            wheel=$(ls dist/*.whl | head -n1)
          fi
          uv pip install --python "$PY" "$wheel"
          uv pip install --python "$PY" pytest pytest-cov
      - name: Run short tests
        shell: bash
        run: |
          ABS_PY="$(realpath "$PY")"
          cd "${{ inputs.manifest-dir }}"
          "$ABS_PY" -m pytest -m "not slow" \
            --cov=${{ inputs.package-path }} \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.cov-fail-under }}

  # -------- Slow tests ------------------------------------------------
  test-slow:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        py: ${{ fromJSON(inputs.slow-test-versions) }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' && inputs.windows-allow-fail }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          version: ${{ inputs.uv-version }}
          cache-dependency-glob: "**/pyproject.toml\n**/uv.lock"
      - run: uv python install ${{ matrix.py }}
      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ inputs.package-name }}-${{ matrix.os }}-${{ inputs.abi3 && '3.12' || matrix.py }}
          path: dist
      - name: Install wheel + test deps
        shell: bash
        run: |
          uv venv .venv --python ${{ matrix.py }}
          if [ -f .venv/bin/python ]; then PY=.venv/bin/python; else PY=.venv/Scripts/python.exe; fi
          echo "PY=$PY" >> "$GITHUB_ENV"
          uv pip install --python "$PY" "$(ls dist/*.whl | head -n1)"
          uv pip install --python "$PY" pytest pytest-cov
      - name: Run slow tests
        shell: bash
        # No --cov-fail-under here: slow tests alone don't represent total
        # coverage, and the threshold is enforced on the short-test job.
        # Exit code 5 ("no tests collected") is treated as success so repos
        # that haven't marked any tests slow yet don't red-light.
        run: |
          set +e
          ABS_PY="$(realpath "$PY")"
          cd "${{ inputs.manifest-dir }}"
          "$ABS_PY" -m pytest -m slow \
            --cov=${{ inputs.package-path }} \
            --cov-append \
            --cov-report=term-missing \
            --cov-report=xml
          rc=$?
          if [ "$rc" = "5" ]; then
            echo "(no slow tests yet — OK)"
            exit 0
          fi
          exit $rc

  # -------- Coverage sticky PR comment --------------------------------
  coverage-comment:
    needs: test-short-linux-windows
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage-xml-short
          path: .
      - id: parse
        run: |
          if [ -f pytest-coverage.txt ]; then
            total=$(grep -E '^TOTAL' pytest-coverage.txt | awk '{print $NF}' || echo "n/a")
            tail=$(awk '/^Name +Stmts/,/^TOTAL/' pytest-coverage.txt | head -200)
          else
            total="n/a"
            tail="(no coverage report found)"
          fi
          echo "total=$total" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<COVEOF'
            echo "$tail"
            echo 'COVEOF'
          } >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pytest-coverage
          message: |
            ### Pytest coverage — total **${{ steps.parse.outputs.total }}**
            <details><summary>Coverage table (Linux 3.12 short tests)</summary>

            ```
            ${{ steps.parse.outputs.report }}
            ```
            </details>

            HTML report: download `coverage-html-short` artifact from this run.
            Threshold (`--cov-fail-under`): ${{ inputs.cov-fail-under }}%.
