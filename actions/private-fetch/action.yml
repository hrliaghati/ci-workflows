name: 'Configure private cross-repo fetch'
description: |
  Mint a short-lived GitHub App token from the caller-provided app id +
  private key, then rewrite git config so HTTPS and SSH github.com URLs
  fetch via that token. Lets cargo and pip resolve private cohort
  cross-repo dependencies (orbprop, routelib, etc.) inside CI runs.

  The org standard is the equiped-release-bot App (id 3680486, public)
  with the private key deployed as RELEASE_BOT_PRIVATE_KEY on each
  consumer. Callers typically pass app-id 3680486 and private-key from
  secrets.RELEASE_BOT_PRIVATE_KEY.

  No-op (silent) when inputs are empty — repos that don't have
  cross-repo deps can include the step unconditionally.

inputs:
  app-id:
    description: 'GitHub App id (the equiped-release-bot id, 3680486, is not a secret).'
    required: false
  private-key:
    description: 'GitHub App private key (pass via secrets.RELEASE_BOT_PRIVATE_KEY).'
    required: false
  owner:
    description: 'GitHub owner (defaults to current repository owner)'
    required: false
    default: ${{ github.repository_owner }}

runs:
  using: 'composite'
  steps:
    # Always-run cleanup: persistent self-hosted runners accumulate
    # stale gitconfig state from previous workflow runs:
    #   - http.https://github.com/.extraheader (an earlier iteration of
    #     this action tried that approach; it collides with
    #     actions/checkout's per-command Authorization → "Duplicate
    #     header: Authorization" 400)
    #   - url.https://x-access-token:<expired>@github.com/.insteadof
    #     entries accumulating one-per-run from `git config --global`
    #     appending rather than replacing
    # Clear all of these before minting fresh auth.
    - name: Clear stale global git auth state (non-Windows)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        git config --global --unset-all http.https://github.com/.extraheader 2>/dev/null || true
        # Drop every `url."https://x-access-token:*@github.com/".insteadof`
        # entry (expired App-installation tokens from previous runs).
        while git config --global --get-regexp '^url\.https://x-access-token:.+@github\.com/\.insteadof' 2>/dev/null | grep -q .; do
          key=$(git config --global --get-regexp '^url\.https://x-access-token:.+@github\.com/\.insteadof' 2>/dev/null | head -1 | awk '{print $1}')
          git config --global --unset-all "$key" 2>/dev/null || break
        done
        rm -f "$HOME/.git-credentials"
    - name: Clear stale global git auth state (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        git config --global --unset-all "http.https://github.com/.extraheader" 2>$null
        if ($LASTEXITCODE -ne 0) { $global:LASTEXITCODE = 0 }
        # Drop stale url.<token>@github.com/.insteadof entries.
        while ($true) {
          $line = (git config --global --get-regexp '^url\.https://x-access-token:.+@github\.com/\.insteadof' 2>$null | Select-Object -First 1)
          if (-not $line) { break }
          $key = ($line -split '\s+')[0]
          git config --global --unset-all $key 2>$null
          if ($LASTEXITCODE -ne 0) { break }
        }
        $global:LASTEXITCODE = 0
        $credFile = Join-Path $env:USERPROFILE ".git-credentials"
        if (Test-Path $credFile) { Remove-Item $credFile -Force }
    - uses: actions/create-github-app-token@v1
      id: token
      continue-on-error: true
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ inputs.owner }}
    - name: Configure git auth (non-Windows)
      if: steps.token.outputs.token != '' && runner.os != 'Windows'
      shell: bash
      run: |
        T='${{ steps.token.outputs.token }}'
        echo "::add-mask::$T"
        # 1. URL rewrite — handles libgit2 callers that read git config.
        git config --global url."https://x-access-token:${T}@github.com/".insteadOf "https://github.com/"
        git config --global url."https://x-access-token:${T}@github.com/".insteadOf "ssh://git@github.com/"
        # 2. Credential store — for any git invocation that ASKS for
        #    credentials (e.g. cargo's `git fetch` via CARGO_NET_GIT_FETCH_WITH_CLI=true
        #    when libgit2's url-rewrite handling doesn't kick in).
        #    Credential helper is only consulted when git lacks creds
        #    inline, so it doesn't conflict with actions/checkout's own
        #    per-command Authorization header (which caused "Duplicate
        #    header: Authorization" 400s when we tried http.extraheader).
        printf 'https://x-access-token:%s@github.com\n' "$T" > "$HOME/.git-credentials"
        chmod 600 "$HOME/.git-credentials"
        git config --global credential.helper store
    - name: Configure git auth (Windows)
      # The self-hosted Windows runner has WSL's bash.exe on PATH but
      # no WSL distro installed (`shell: bash` fails). It also doesn't
      # have PowerShell Core (`shell: pwsh` fails). Windows PowerShell
      # 5.x is always present, so use that.
      if: steps.token.outputs.token != '' && runner.os == 'Windows'
      shell: powershell
      run: |
        $T = '${{ steps.token.outputs.token }}'
        Write-Host "::add-mask::$T"
        git config --global "url.https://x-access-token:$T@github.com/.insteadOf" "https://github.com/"
        git config --global "url.https://x-access-token:$T@github.com/.insteadOf" "ssh://git@github.com/"
        $credFile = Join-Path $env:USERPROFILE ".git-credentials"
        "https://x-access-token:$T@github.com" | Set-Content -Encoding Ascii $credFile
        git config --global credential.helper store
